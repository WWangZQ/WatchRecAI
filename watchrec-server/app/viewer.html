<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchRec</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* warm editorial palette (Claude) */
  --bg: #FAF9F7;
  --bg-secondary: #F5F0EB;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --secondary: #6B6B6B;
  --tertiary: #9B9B9B;
  --accent: #C96442;          /* terracotta — Claude signature */
  --accent-light: rgba(201, 100, 66, 0.08);
  --sage: #7B8E6B;
  --border: #E8E4DF;
  --border-medium: #D5D0CA;
  --radius: 12px;

  --serif: Georgia, 'Charter', 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
  --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────────────────── */

.app { display: flex; flex-direction: column; height: 100vh; }
.header {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header h1 span { color: var(--secondary); font-size: 15px; font-weight: 400; }

/* ── Status (header right) ──────────────────────── */
.status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--secondary);
  font-variant-numeric: tabular-nums;
}
.status .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--tertiary);
  flex-shrink: 0;
}
.status .dot.ok   { background: var(--sage); animation: pulse 2.6s ease-in-out infinite; }
.status .dot.busy { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
.status .dot.down { background: #A23E2A; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.status .pill { display: inline-flex; align-items: center; gap: 7px; }
.status .pill#statusMeta { color: var(--tertiary); }

.log-toggle {
  font-family: var(--sans);
  border: 1px solid var(--border-medium);
  background: transparent;
  color: var(--secondary);
  font-size: 13px;
  padding: 5px 13px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.25,0.1,0.25,1);
}
.log-toggle:hover { color: var(--accent); border-color: var(--accent); }
.log-toggle.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

/* ── Log panel (warm console) ───────────────────── */
.log-panel {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 300px;
  background: var(--card);
  border-top: 1px solid var(--border-medium);
  z-index: 200;
  display: none;
  flex-direction: column;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
}
.log-panel.open { display: flex; }
.log-panel .log-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  color: var(--secondary);
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.log-panel .log-head .close {
  margin-left: auto; cursor: pointer; color: var(--tertiary);
  font-size: 20px; line-height: 1; padding: 0 4px;
}
.log-panel .log-head .close:hover { color: var(--accent); }
.log-body {
  flex: 1; overflow-y: auto;
  padding: 14px 20px;
  font-family: var(--mono);
  font-size: 12.5px; line-height: 1.7;
  color: var(--text);
  background: var(--bg-secondary);
  white-space: pre-wrap; word-break: break-all;
}
.log-body::-webkit-scrollbar { width: 7px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 4px; }
.log-body .ln { display: block; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar (conversation-list feel) ───────────── */

.sidebar {
  width: 300px;
  min-width: 300px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg);
  padding: 12px 10px;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.date-group { margin-bottom: 6px; }
.date-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 14px 10px 6px;
}

.recording-item {
  padding: 11px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s ease;
  margin-bottom: 2px;
}
.recording-item:hover { background: var(--bg-secondary); }
.recording-item.active { background: var(--accent-light); }
.recording-item .item-time {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.recording-item.active .item-time { color: var(--accent); }
.recording-item .item-meta {
  font-size: 11px;
  color: var(--tertiary);
  font-weight: 400;
}
.recording-item .item-snippet {
  font-size: 12.5px;
  color: var(--secondary);
  margin-top: 5px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--tertiary);
  font-size: 14px;
}

/* ── Detail (centered reading column) ───────────── */

.detail {
  flex: 1;
  overflow-y: auto;
  /* 阅读栏最宽 820px；窗口小时两侧留白缩到 24px，让文字尽量铺开 */
  padding: 48px max(24px, calc((100% - 820px) / 2)) 150px;
}
.detail::-webkit-scrollbar { width: 7px; }
.detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.detail-header,
.summary-card,
.card,
.detail details { animation: fadeUp 0.35s cubic-bezier(0.25,0.1,0.25,1) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.detail-header { margin-bottom: 28px; }
.detail-header .datetime-line {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.detail-header .meta-line {
  font-size: 13px;
  color: var(--tertiary);
  margin-top: 8px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  padding: 24px;
  margin-bottom: 24px;
}

/* Summary callout */
.summary-card {
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 18px 22px;
  margin-bottom: 28px;
}
.summary-card .label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.summary-card > div:last-child {
  font-family: var(--serif);
  font-size: 16px;
  line-height: 1.7;
}
.summary-card .placeholder { color: var(--tertiary); font-size: 14px; font-family: var(--sans); }

/* Transcript — editorial body */
.transcript-card h3 {
  font-size: 11px;
  font-weight: 600;
  color: var(--tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 16px;
}
.transcript-card p {
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.85;
  margin-bottom: 16px;
  color: var(--text);
}
.transcript-card p.ph { font-family: var(--sans); font-size: 14px; color: var(--tertiary); }

/* AI 生成按钮（赤陶描边） */
.gen-btn {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 9px 18px;
  margin-top: 8px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.25,0.1,0.25,1);
}
.gen-btn:hover:not(:disabled) { background: var(--accent); color: #fff; }
.gen-btn:disabled { opacity: 0.6; cursor: default; }

/* Raw details */
details { margin-top: 8px; }
details summary {
  font-size: 13px;
  font-weight: 600;
  color: var(--secondary);
  cursor: pointer;
  padding: 10px 0;
  user-select: none;
}
details summary:hover { color: var(--accent); }
details[open] summary { margin-bottom: 12px; }
.raw-content {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--secondary);
  white-space: pre-wrap;
  word-break: break-all;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  padding: 16px 18px;
  border-radius: 8px;
  max-height: 320px;
  overflow-y: auto;
}

/* ── Player bar ─────────────────────────────────── */

.player-bar {
  position: fixed;
  bottom: 0;
  left: 300px;
  right: 0;
  height: 76px;
  background: rgba(250,249,247,0.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 18px;
  z-index: 100;
}
.player-bar.hidden { display: none; }

.play-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s ease;
}
.play-btn:hover { opacity: 0.88; }
.play-btn svg { fill: #fff; }

.progress-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0;
  transition: width 0.1s linear;
}
.progress-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  left: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.progress-track:hover .progress-thumb { opacity: 1; }

.time-display {
  font-size: 12px;
  color: var(--secondary);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  min-width: 92px;
  text-align: right;
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>WatchRec <span>· 录音转写</span></h1>
    <div class="status" id="status">
      <span class="pill"><span class="dot" id="statusDot"></span><span id="statusText">连接中…</span></span>
      <span class="pill" id="statusMeta"></span>
      <button class="log-toggle" id="logToggle" onclick="toggleLog()">日志</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="empty-state">加载中…</div>
    </div>

    <div class="detail" id="detail">
      <div class="empty-state">选择一条录音</div>
    </div>
  </div>

  <div class="player-bar hidden" id="playerBar">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <svg id="iconPlay" width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="progress-wrap">
      <span class="time-display" id="timeCurrent">0:00</span>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <span class="time-display" id="timeTotal">0:00</span>
    </div>
  </div>
</div>

<div class="log-panel" id="logPanel">
  <div class="log-head">
    服务日志
    <span class="close" onclick="toggleLog()">×</span>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const audio = $('#audio');
let recordings = [];
let currentId = null;

// ── Data ─────────────────────────────────────────

async function loadRecordings() {
  try {
    const res = await fetch('/api/recordings');
    recordings = await res.json();
    renderList();
  } catch (e) {
    $('#sidebar').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

// ── Sidebar ──────────────────────────────────────

function renderList() {
  const sidebar = $('#sidebar');
  if (!recordings.length) {
    sidebar.innerHTML = '<div class="empty-state">暂无录音</div>';
    return;
  }

  const groups = {};
  recordings.forEach(r => {
    const d = r.date || 'unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(r);
  });

  let html = '';
  for (const [date, items] of Object.entries(groups)) {
    html += `<div class="date-group"><div class="date-label">${formatDate(date)}</div>`;
    items.forEach(r => {
      const dur = r.duration_sec ? formatDuration(r.duration_sec) : '';
      const active = r.id === currentId ? ' active' : '';
      html += `<div class="recording-item${active}" data-id="${esc(r.id)}" onclick="selectRecording('${esc(r.id)}')">
        <div class="item-time">${esc(r.time || '--:--')}<span class="item-meta" style="margin-left:8px">${esc(dur)}</span></div>
        <div class="item-snippet">${esc(r.snippet)}</div>
      </div>`;
    });
    html += '</div>';
  }
  sidebar.innerHTML = html;
}

// ── Detail ───────────────────────────────────────

async function selectRecording(id) {
  currentId = id;

  // Highlight sidebar
  $$('.recording-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));

  const detail = $('#detail');
  detail.innerHTML = '<div class="empty-state">加载中…</div>';

  try {
    const res = await fetch('/api/recording?id=' + encodeURIComponent(id));
    const data = await res.json();
    renderDetail(data);
  } catch (e) {
    detail.innerHTML = '<div class="empty-state">加载失败</div>';
  }

  // Switch audio source — pause, no autoplay
  audio.src = '/api/audio?id=' + encodeURIComponent(id);
  audio.pause();
  updatePlayBtn(false);
  $('#playerBar').classList.remove('hidden');
  $('#timeCurrent').textContent = '0:00';
  $('#timeTotal').textContent = data?.duration_sec ? formatDuration(data.duration_sec) : '0:00';
  $('#progressFill').style.width = '0%';
  $('#progressThumb').style.left = '0%';
}

function renderDetail(data) {
  const detail = $('#detail');
  const emotion = parseEmotion(data.raw);
  const lang = data.language || '';
  const dur = data.duration_sec ? formatDuration(data.duration_sec) : '';
  const recorded = data.recorded_at || '';

  let metaParts = [];
  if (dur) metaParts.push(`时长 ${dur}`);
  if (lang) metaParts.push(lang);
  if (emotion) metaParts.push(emotion);

  const summary = data.summary || '';
  const fullText = data.full_text || '';
  const transcript = data.transcript || '';
  const raw = data.raw || '';

  let html = `<div class="detail-header">
    <div class="datetime-line">${esc(recorded)}</div>
    <div class="meta-line">${esc(metaParts.join(' · '))}</div>
  </div>`;

  // AI 总结（全文 → 提炼）
  html += `<div class="summary-card">
    <div class="label">AI 总结</div>
    <div>${summary ? esc(summary) : '<span class="placeholder">AI 总结待生成</span>'}</div>
  </div>`;

  // 全文（原文 → AI 去噪整理）
  html += `<div class="card transcript-card"><h3>全文</h3>`;
  if (fullText) {
    fullText.split(/\n+/).filter(Boolean).forEach(p => { html += `<p>${esc(p)}</p>`; });
  } else {
    html += `<p class="ph">AI 去噪待生成</p>`;
  }
  if (!fullText || !summary) {
    html += `<button class="gen-btn" id="genBtn" onclick="enrichCurrent()">用 AI 生成全文与总结</button>`;
  }
  html += '</div>';

  // 原文（去标记逐字稿）
  html += `<div class="card transcript-card"><h3>原文</h3>`;
  if (transcript) {
    transcript.split(/\n+/).filter(Boolean).forEach(p => { html += `<p>${esc(p)}</p>`; });
  } else {
    html += `<p class="ph">（无转写）</p>`;
  }
  html += '</div>';

  // 原始标记（含情感/事件标记，折叠）
  html += `<details>
    <summary>原始标记</summary>
    <div class="raw-content">${esc(raw)}</div>
  </details>`;

  detail.innerHTML = html;
}

async function enrichCurrent() {
  if (!currentId) return;
  const btn = $('#genBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'AI 生成中…（约 10–30 秒）'; }
  try {
    const res = await fetch('/api/enrich?id=' + encodeURIComponent(currentId), { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || ('HTTP ' + res.status));
    }
    await selectRecording(currentId);  // 重新渲染详情
    loadRecordings();                  // 刷新侧栏摘要
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '生成失败：' + e.message + '（点此重试）'; }
  }
}

function parseEmotion(raw) {
  if (!raw) return null;
  const m = raw.match(/<\|(EMO_\w+|NEUTRAL|HAPPY|SAD|ANGRY)\|>/);
  if (!m) return null;
  const tag = m[1];
  const map = {
    'NEUTRAL': '中性', 'HAPPY': '开心', 'SAD': '难过',
    'ANGRY': '生气', 'EMO_UNKNOWN': null
  };
  return map[tag] || (tag.startsWith('EMO_') ? tag.slice(4).toLowerCase() : tag.toLowerCase());
}

// ── Player ───────────────────────────────────────

function togglePlay() {
  if (audio.paused) { audio.play(); } else { audio.pause(); }
}

function updatePlayBtn(playing) {
  $('#iconPlay').style.display = playing ? 'none' : 'block';
  $('#iconPause').style.display = playing ? 'block' : 'none';
}

audio.onplay = () => updatePlayBtn(true);
audio.onpause = () => updatePlayBtn(false);
audio.onended = () => updatePlayBtn(false);

audio.ontimeupdate = () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  $('#progressFill').style.width = pct + '%';
  $('#progressThumb').style.left = pct + '%';
  $('#timeCurrent').textContent = formatTime(audio.currentTime);
};

audio.onloadedmetadata = () => {
  $('#timeTotal').textContent = formatTime(audio.duration);
};

// Seek on click
$('#progressTrack').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
});

// ── Helpers ──────────────────────────────────────

function formatDuration(sec) {
  sec = Math.round(sec);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatTime(sec) {
  if (!sec || !isFinite(sec)) return '0:00';
  return formatDuration(sec);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('-');
  if (parts.length >= 3) {
    return `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  }
  return dateStr;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Status bar ───────────────────────────────────

let _statusFail = 0;

async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const s = await res.json();
    _statusFail = 0;

    const dot = $('#statusDot');
    const text = $('#statusText');
    if (s.transcribing) {
      dot.className = 'dot busy';
      text.textContent = '转写中：' + s.transcribing;
    } else if (s.model_loaded) {
      dot.className = 'dot ok';
      text.textContent = '运行中';
    } else {
      dot.className = 'dot ok';
      text.textContent = '启动中（模型加载…）';
    }

    const parts = [];
    if (typeof s.pending === 'number') parts.push('待处理 ' + s.pending);
    if (s.last_poll_at) parts.push('轮询 ' + agoText(s.last_poll_at) + '前');
    $('#statusMeta').textContent = parts.join(' · ');
  } catch (e) {
    if (++_statusFail >= 2) {
      $('#statusDot').className = 'dot down';
      $('#statusText').textContent = '服务未响应';
      $('#statusMeta').textContent = '';
    }
  }
}

function agoText(epochSec) {
  const d = Math.max(0, Math.floor(Date.now() / 1000 - epochSec));
  if (d < 60) return d + '秒';
  if (d < 3600) return Math.floor(d / 60) + '分';
  return Math.floor(d / 3600) + '时';
}

// ── Log panel ────────────────────────────────────

let logOpen = false;
let logSince = 0;
let logTimer = null;

function toggleLog() {
  logOpen = !logOpen;
  $('#logPanel').classList.toggle('open', logOpen);
  $('#logToggle').classList.toggle('active', logOpen);
  if (logOpen) {
    pollLogs();
    logTimer = setInterval(pollLogs, 1500);
  } else {
    clearInterval(logTimer);
  }
}

async function pollLogs() {
  try {
    const res = await fetch('/api/logs?since=' + logSince);
    const data = await res.json();
    if (data.lines && data.lines.length) {
      const body = $('#logBody');
      const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      data.lines.forEach(ln => {
        const el = document.createElement('span');
        el.className = 'ln';
        el.textContent = ln;
        body.appendChild(el);
      });
      while (body.childElementCount > 1000) body.removeChild(body.firstChild);
      logSince = data.last;
      if (atBottom) body.scrollTop = body.scrollHeight;
    }
  } catch (e) { /* 服务暂时不可达，下次再试 */ }
}

pollStatus();
setInterval(pollStatus, 3000);
